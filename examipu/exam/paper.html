<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>試験問題</title>
  <link rel="stylesheet" href="exam.css?v=20260610">
</head>
<body>

  <!-- 試験中ヘッダ -->
  <header class="exhead" id="examMain-head">
    <span class="ttl">📝 試験</span>
    <span class="who" id="headWho"></span>
    <span class="spacer"></span>
    <span class="save" id="saveState">未保存</span>
    <span class="timer" id="timer">--:--</span>
    <button id="submitBtn" type="button">提出して終了</button>
  </header>

  <!-- 試験本体 -->
  <main id="examMain">
    <div class="wrap">
      <h1 class="exam-title" id="examTitle"></h1>
      <p class="exam-sub" id="examSub"></p>
      <div class="notes" id="notes"></div>
      <div id="sections"></div>
      <div style="text-align:center;margin-top:30px">
        <button class="startbtn" style="background:#1a56db;color:#fff" onclick="document.getElementById('submitBtn').click()">提出して終了</button>
      </div>
    </div>
  </main>

  <!-- 提出後 -->
  <section id="doneView">
    <div class="ok" id="doneIcon">✅</div>
    <h2 id="doneHead">提出が完了しました</h2>
    <p class="name"></p>
    <p id="serverState" style="font-weight:700"></p>
    <p id="doneMsg">このウィンドウは閉じてかまいません。</p>
    <div class="dl" id="dlBox">
      <button id="dlHtml" type="button">解答シート(HTML)を保存</button>
      <button id="dlJson" type="button">解答データ(JSON)を保存</button>
    </div>
    <div class="dl">
      <button id="closeWin" type="button" style="background:#6b7480">ウィンドウを閉じる</button>
    </div>
  </section>

  <!-- 問題データはサーバー(GAS)から取得するため questions.js は読み込まない -->
  <script src="config.js?v=20260610"></script>
  <!-- 内部設計書§3.1 googleAuth.js読込追加（FR-C12） -->
  <script src="googleAuth.js?v=20260610"></script>
  <script src="drawing.js?v=20260610"></script>
  <script src="exam.js?v=20260610"></script>
</body>
</html>
