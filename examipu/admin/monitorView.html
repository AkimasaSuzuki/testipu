<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>ExamForge 受験モニタ</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>
<!--
  admin/monitorView.html — SC-14 受験モニタ画面
  実装指示書§4 P3-6・FR-D10・FR-E07 を実装根拠とする。
  URLクエリ ?exam=<examId> で対象試験を指定する。
  相互import禁止のため、本画面のスクリプトは apiClient.js / monitorView.js のみを読み込む。
-->
<div class="efhead">
  <div class="ttl">ExamForge<small>教員管理画面</small></div>
  <nav>
    <a href="dashboard.html">試験一覧</a>
  </nav>
  <button class="logout" id="btnLogout" type="button">ログアウト</button>
</div>

<div class="wrap">
  <h1>受験モニタ</h1>

  <div class="hint">
    受験中の学生の状態をリアルタイムに近い形で確認できます。30秒ごとに自動更新されます。
    「テスト」バッジが付いた行は担当教員自身によるテスト受験です（区別表示のみで一覧からは除外しません）。
  </div>

  <div class="btnbar">
    <button type="button" id="btnRefresh">今すぐ更新</button>
    <span id="lastUpdated" class="hint" style="display:inline-block;margin:0;padding:6px 10px;"></span>
  </div>

  <div id="msgArea"></div>

  <div class="card">
    <div id="listHost">
      <div class="loading">読み込み中です…</div>
    </div>
  </div>
</div>

<footer class="efnote">ExamForge 教員管理画面 / このページは担当教員のみが使用してください。</footer>

<script src="apiClient.js"></script>
<script src="monitorView.js"></script>
</body>
</html>
