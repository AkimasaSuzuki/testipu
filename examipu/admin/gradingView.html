<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>ExamForge 採点レビュー</title>
<link rel="stylesheet" href="admin.css">
<!-- exam/exam.css は模範図表示に使う ../exam/drawing.js（DrawPad）の描画バー/キャンバス見た目に必要なため読み込む。
     admin.css には .drawpad 系スタイルが無いため。外部CDNではなく同一リポジトリ内CSSのみ（実装規約3） -->
<link rel="stylesheet" href="../exam/exam.css">
<style>
  /* gradingView専用の小さな追加スタイル（実装指示書§7.5 SC-15）。既存admin.cssは変更しない */
  .gv-tabs{display:flex; gap:6px; margin-bottom:14px}
  .gv-tabs button{background:#fff; color:var(--accent-d); border:1px solid var(--line); padding:8px 18px}
  .gv-tabs button.active{background:var(--accent); color:#fff; border-color:var(--accent)}
  .gv-toolbar{display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; margin-bottom:14px}
  .gv-toolbar label.field{margin-bottom:0; min-width:220px; flex:1}
  .gv-row{border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:14px; background:#fff}
  .gv-row .gv-row-head{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:8px}
  .gv-row .gv-row-head .name{font-weight:700}
  .gv-answer{background:#fbfbfd; border:1px dashed var(--line); border-radius:8px; padding:10px 12px; margin:8px 0; white-space:pre-wrap; word-break:break-word; font-size:13.5px}
  .gv-answer.code{font-family:ui-monospace,SFMono-Regular,Consolas,monospace; background:#1f2733; color:#e8ecf5; white-space:pre}
  .gv-drawpair{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  @media (max-width:820px){.gv-drawpair{grid-template-columns:1fr}}
  .gv-drawpair .cap{font-size:12px; color:var(--muted); margin-bottom:4px}
  .gv-drawpair img{max-width:100%; border:1px solid var(--line); border-radius:6px; background:#fff}
  .gv-modeldraw-host{border:1px solid var(--line); border-radius:6px; overflow:hidden; pointer-events:none; opacity:.92}
  .gv-scorebar{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:8px}
  .gv-scorebar input[type="number"]{width:90px}
  .gv-scorebar input[type="text"]{flex:1; min-width:180px}
  .gv-scorebar label.chk{display:flex; align-items:center; gap:5px; font-size:12.5px; color:var(--muted); white-space:nowrap}
  .gv-qpicker{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px}
  .gv-qpicker button{background:#fff; color:var(--accent-d); border:1px solid var(--line); padding:6px 12px; font-size:12.5px}
  .gv-qpicker button.active{background:var(--accent-d); color:#fff; border-color:var(--accent-d)}
  .gv-student-block{border-bottom:1px solid var(--line); padding:14px 0}
  .gv-student-block:last-child{border-bottom:0}
  .gv-qlabel{font-weight:700; color:var(--accent-d); margin-bottom:4px}
</style>
</head>
<body>
<!--
  admin/gradingView.html — SC-15 採点レビュー画面
  実装指示書§7.5 SC-15・UC-05・FR-E05/E06/E09/C14 を実装根拠とする。
  URLクエリ ?exam=<examId> で対象試験を指定。
  設問単位（横断採点・FR-E05）と学生単位の2ビューをタブで切替える。
  相互import禁止のため、本画面のスクリプトは apiClient.js / ../exam/drawing.js / gradingView.js のみを読み込む。
  ADMIN_TOKENはハードコードしない（apiClient.jsのsessionStorage経由のみ）。
-->
<div class="efhead">
  <div class="ttl">ExamForge<small>教員管理画面</small></div>
  <nav>
    <a href="dashboard.html">試験一覧</a>
    <a href="reportView.html" id="navSummary">成績集計へ</a>
  </nav>
  <button class="logout" id="btnLogout" type="button">ログアウト</button>
</div>

<div class="wrap">
  <h1>採点レビュー<small id="examTitleLabel" style="font-weight:400;font-size:14px;color:var(--muted);margin-left:8px"></small></h1>

  <div class="hint">
    自動採点は選択式のみ自動確定します。記述式・コード・作図式は仮採点または未採点のまま
    「要確認」フラグが付きます（実装指示書§8 C14）。内容を確認し、得点・コメントを入力して保存してください。
  </div>

  <!-- ===== 自動採点実行 ===== -->
  <div class="card">
    <h2>自動採点</h2>
    <div class="btnbar">
      <button type="button" id="btnAutoGrade">自動採点を実行</button>
      <button type="button" id="btnReload" class="secondary">再読込</button>
    </div>
    <div id="autoGradeMsg"></div>
  </div>

  <!-- ===== 提出一覧 ===== -->
  <div class="card">
    <h2>提出一覧</h2>
    <div id="submissionListHost"><div class="loading">読み込み中…</div></div>
  </div>

  <!-- ===== ビュー切替タブ（設問単位／学生単位。FR-E05） ===== -->
  <div class="card">
    <div class="gv-tabs">
      <button type="button" id="tabByQuestion" class="active">設問別（横断採点）</button>
      <button type="button" id="tabByStudent">学生別</button>
    </div>

    <!-- ---- 設問別ビュー ---- -->
    <div id="viewByQuestion">
      <div class="gv-qpicker" id="qPicker"></div>
      <div id="byQuestionHost"><div class="empty">設問を選択してください。</div></div>
    </div>

    <!-- ---- 学生別ビュー ---- -->
    <div id="viewByStudent" style="display:none">
      <div class="gv-toolbar">
        <label class="field">
          <span>学生（sid）を選択</span>
          <select id="studentPicker"></select>
        </label>
      </div>
      <div id="byStudentHost"><div class="empty">学生を選択してください。</div></div>
    </div>

    <div class="btnbar">
      <button type="button" id="btnSaveGrades">採点結果を保存</button>
    </div>
    <div id="saveGradesMsg"></div>
  </div>
</div>

<footer class="efnote">ExamForge 教員管理画面 / このページは担当教員のみが使用してください。</footer>

<script src="apiClient.js"></script>
<script src="../exam/drawing.js"></script>
<script src="gradingView.js"></script>
</body>
</html>
