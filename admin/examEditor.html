<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>ExamForge 試験エディタ</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>
<!--
  admin/examEditor.html — SC-12 試験エディタ画面
  実装指示書§4 P3・UC-01・FR-B01〜B08、内部設計書 画面一覧SC-12 を実装根拠とする。
  URLクエリ ?exam=<examId> で既存試験を編集、無ければ新規作成モード。
  ADMIN_TOKENはハードコードしない（apiClient.jsのsessionStorage経由のみ）。
  相互import禁止のため、本画面のスクリプトは apiClient.js / examEditor.js / ../exam/drawing.js のみを読み込む。
-->
<div class="efhead">
  <div class="ttl">ExamForge<small>教員管理画面</small></div>
  <nav>
    <a href="dashboard.html">試験一覧</a>
  </nav>
  <button class="logout" id="btnLogout" type="button">ログアウト</button>
</div>

<div class="wrap">
  <h1 id="pageTitle">試験エディタ</h1>

  <div class="hint">
    このページはブラウザ内で試験定義（EXAM_JSON）を編集し、保存ボタンでサーバーに送信します。
    保存するまでサーバー側のデータは変更されません。
  </div>

  <!-- ===== 配点集計・状態表示 ===== -->
  <div class="card" id="summaryCard">
    <div class="card-row">
      <div><strong>現在の合計点（設問の points 合計）：</strong><span id="sumAnswers">0</span> 点</div>
      <div><strong>大問の points 合計：</strong><span id="sumSections">0</span> 点</div>
    </div>
    <div id="pointsWarn"></div>
  </div>

  <!-- ===== 試験情報 ===== -->
  <div class="card">
    <h2>試験情報</h2>
    <label class="field">
      <span>examId</span>
      <input type="text" id="fExamId" readonly placeholder="（新規作成後に採番されます）">
    </label>
    <div class="grid2">
      <label class="field">
        <span>タイトル</span>
        <input type="text" id="fTitle" placeholder="例：ソフトウェア工学 中間試験">
      </label>
      <label class="field">
        <span>制限時間（分）</span>
        <input type="number" id="fDuration" min="1" step="1" value="90">
      </label>
    </div>
    <div class="grid2">
      <label class="field">
        <span>最大不正カウント数（maxViolations）</span>
        <input type="number" id="fMaxViolations" min="0" step="1" value="3">
      </label>
      <label class="field">
        <span>注意事項（notes。1行に1項目）</span>
        <textarea id="fNotes" rows="3" placeholder="例：スマートフォンの使用を禁止します"></textarea>
      </label>
    </div>
  </div>

  <!-- ===== 大問（sections） ===== -->
  <div class="card">
    <h2>大問（sections）</h2>
    <div id="sectionsHost"></div>
    <div class="btnbar">
      <button type="button" id="btnAddSection">＋ 大問を追加</button>
    </div>
  </div>

  <!-- ===== 公開設定 ===== -->
  <div class="card">
    <h2>公開設定</h2>
    <div class="grid2">
      <label class="field">
        <span>公開開始日時（open）</span>
        <input type="datetime-local" id="fOpen">
      </label>
      <label class="field">
        <span>公開終了日時（close）</span>
        <input type="datetime-local" id="fClose">
      </label>
    </div>
    <label class="field">
      <span>state（試験の状態）</span>
      <select id="fState">
        <option value="draft">draft（下書き）</option>
        <option value="published">published（公開中）</option>
        <option value="closed">closed（終了）</option>
      </select>
    </label>
    <div class="hint">published から draft への変更は、受験を開始した学生が1人もいない場合のみ許可されます。</div>
    <div id="scheduleMsg"></div>
    <div class="btnbar">
      <button type="button" id="btnSaveSchedule">公開設定を保存</button>
    </div>
  </div>

  <!-- ===== プレビュー・入出力・保存 ===== -->
  <div class="card">
    <h2>プレビュー・入出力</h2>
    <div class="btnbar">
      <button type="button" id="btnPreview" class="secondary">プレビュー表示</button>
      <button type="button" id="btnExport" class="secondary">JSONエクスポート</button>
      <button type="button" id="btnImportTrigger" class="secondary">JSONインポート</button>
      <input type="file" id="fileImport" accept="application/json" style="display:none">
    </div>
    <iframe id="previewFrame" class="preview-frame" style="display:none"></iframe>
  </div>

  <div class="card">
    <div class="btnbar">
      <button type="button" id="btnSaveExam">試験を保存</button>
    </div>
    <div id="saveMsg"></div>
  </div>
</div>

<footer class="efnote">ExamForge 教員管理画面 / このページは担当教員のみが使用してください。</footer>

<script src="apiClient.js"></script>
<script src="../exam/drawing.js"></script>
<script src="examEditor.js"></script>
</body>
</html>
