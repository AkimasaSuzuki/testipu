<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>ExamForge 教員ログイン</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>
<!--
  admin/index.html — SC-10 ログイン画面
  実装指示書§4 P3-2・§5 P3-2、内部設計書 画面一覧SC-10 を実装根拠とする。
  GAS URL・ADMIN_TOKEN を入力しApiClient.loginでping接続テスト→admin.listExamsでトークン検証。
  ADMIN_TOKENはsessionStorageにのみ保持し、リポジトリ内ファイルには一切書き込まない（FR-F02）。
  トークンはURLに載せない（POST body / GET queryのtokenパラメータのみ。フォームはpassword type）。
-->
<div class="wrap narrow">
  <h1>ExamForge 教員ログイン</h1>
  <div class="card">
    <p class="hint">GASウェブアプリのデプロイURLと管理者トークン（ADMIN_TOKEN）を入力してください。
      導入時に setup ウィザードで発行された値です。トークンはこのブラウザのタブを閉じるまで保持され、サーバーやファイルには保存されません。</p>

    <label class="field">
      <span>GAS_ENDPOINT（デプロイURL）</span>
      <input type="url" id="gasEndpoint" placeholder="https://script.google.com/macros/s/xxxx/exec" autocomplete="off">
    </label>
    <label class="field">
      <span>ADMIN_TOKEN</span>
      <input type="password" id="adminToken" placeholder="管理者トークン" autocomplete="off">
    </label>

    <div class="btnbar">
      <button id="btnLogin" type="button">接続してログイン</button>
      <button id="btnLogout" type="button" class="secondary">ログアウト（保存済みトークン消去）</button>
    </div>
    <div id="msg" role="status"></div>
  </div>

  <p class="hint">受験アプリではありません。この画面は担当教員のみが使用してください。</p>
</div>

<script src="apiClient.js"></script>
<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  var msg = $("msg");

  function showError(text) {
    msg.innerHTML = '<div class="error-box">' + text.replace(/[<>&]/g, function (c) {
      return c === "<" ? "&lt;" : c === ">" ? "&gt;" : "&amp;";
    }) + "</div>";
  }
  function showInfo(text) { msg.innerHTML = '<div class="hint">' + text + "</div>"; }

  // 既にログイン済みならダッシュボードへ即遷移（実装指示書P3-2）
  if (window.ApiClient && ApiClient.AdminSession.isLoggedIn()) {
    location.href = "dashboard.html";
  }

  $("btnLogin").addEventListener("click", function () {
    var endpoint = $("gasEndpoint").value.trim();
    var token = $("adminToken").value.trim();
    if (!endpoint || !token) {
      showError("GAS_ENDPOINTとADMIN_TOKENの両方を入力してください。");
      return;
    }
    $("btnLogin").disabled = true;
    showInfo("接続テスト中…");
    ApiClient.login(endpoint, token).then(function () {
      showInfo("接続に成功しました。ダッシュボードへ移動します…");
      location.href = "dashboard.html";
    }).catch(function (err) {
      $("btnLogin").disabled = false;
      showError((err && err.message) || "接続に失敗しました。URL・トークンを確認してください。");
    });
  });

  $("btnLogout").addEventListener("click", function () {
    ApiClient.logout();
    $("gasEndpoint").value = "";
    $("adminToken").value = "";
    showInfo("保存済みのログイン情報を消去しました。");
  });
})();
</script>
</body>
</html>
